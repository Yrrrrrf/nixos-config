# /etc/nixos/modules/home/hyprland/hyprlock.conf
#
# A minimal and stylish lock screen configuration that matches the
# Catppuccin theme from your Waybar setup.

# General settings
general {
    hide_cursor = true
    no_fade_in = false
}

# Background: A blurred screenshot of your desktop
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    vibrancy = 0.1696
    vibrancy_darkness = 0.05
}

# User Image
image {
    monitor =
    path = /home/yrrrrrf/Pictures/Images/fire.png

    size = 360
    # rounding = -1 # -1 circular

    # border_size = 2
    # border_color = rgba(33ccffee) rgba(00ff99ee) 45deg

    position = 0, 192
    halign = center
    valign = center
}

# Time Label (Big)
label {
    monitor =
    text = $TIME
    color = rgba(203, 166, 247, 1.0) # Catppuccin Mauve
    font_size = 96
    font_family = JetBrainsMono Nerd Font

    position = 0, 512
    halign = center
    valign = center
}

# Date Label (Smaller)
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B" # Updates every 60 seconds
    color = rgba(205, 214, 244, 1.0) # Catppuccin Text
    font_size = 16
    font_family = JetBrainsMono Nerd Font

    position = 0, 448
    halign = center
    valign = center
}

# Input Field for Password
input-field {
    monitor =
    size = 320, 48
    outline_thickness = 2
    dots_size = 0.2 # Scale of input dots
    dots_spacing = 0.6 # Spacing between dots

    inner_color = rgba(24, 24, 36, 0.5) # Catppuccin Base, semi-transparent
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg # Matches your Hyprland active border
    font_color = rgb(205, 214, 244) # Catppuccin Text
    
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 15 # Matches your window rounding

    position = 0, -100
    halign = center
    valign = center
}
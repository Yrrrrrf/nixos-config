# /etc/nixos/modules/home/editor/languages.toml
#
# A curated language configuration for the Helix editor, managed by Nix.
# This file configures language servers (LSPs), indentation, and formatters
# for a modern development toolchain including Rust, Python, Web Dev, and more.
# Auto-formatting on save is explicitly disabled for all languages.

# --- Rust ---
[[language]]
name = "rust"
scope = "source.rust"
injection-regex = "rs|rust"
file-types = ["rs"]
roots = ["Cargo.toml", "Cargo.lock"]
auto-format = false
comment-tokens = ["//", "///", "//!"]
language-servers = [ "rust-analyzer" ]
indent = { tab-width = 4, unit = "    " }

[language-server.rust-analyzer]
command = "rust-analyzer"
[language-server.rust-analyzer.config]
inlayHints.bindingModeHints.enable = false
inlayHints.closingBraceHints.minLines = 10
inlayHints.closureReturnTypeHints.enable = "with_block"
inlayHints.discriminantHints.enable = "fieldless"
inlayHints.lifetimeElisionHints.enable = "skip_trivial"
inlayHints.typeHints.hideClosureInitialization = false

# --- Python ---
[[language]]
name = "python"
scope = "source.python"
injection-regex = "py(thon)?"
file-types = ["py", "pyi", "pyw"]
shebangs = ["python", "uv"]
roots = ["pyproject.toml", "setup.py", "poetry.lock", "pyrightconfig.json"]
comment-token = "#"
language-servers = [ "pyright", "ruff-lsp" ]
indent = { tab-width = 4, unit = "    " }
formatter = { command = "ruff", args = ["format", "-"] }
auto-format = false

[language-server.pyright]
command = "pyright-langserver"
args = ["--stdio"]

[language-server.ruff-lsp]
command = "ruff-lsp"

# --- C & C++ ---
[[language]]
name = "c"
scope = "source.c"
file-types = ["c", "h"]
language-servers = [ "clangd" ]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
indent = { tab-width = 4, unit = "    " }
auto-format = false

[[language]]
name = "cpp"
scope = "source.cpp"
file-types = ["cpp", "hpp", "cxx", "hxx", "cc", "hh"]
language-servers = [ "clangd" ]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
indent = { tab-width = 4, unit = "    " }
auto-format = false

[language-server.clangd]
command = "clangd"

# --- Web Development (TypeScript, JavaScript, JSON, HTML, CSS, Svelte) ---
[[language]]
name = "typescript"
language-servers = [ "typescript-language-server" ]
scope = "source.ts"
file-types = ["ts", "tsx"]
roots = [ "package.json", "tsconfig.json" ]
comment-token = "//"
indent = { tab-width = 2, unit = "  " }
auto-format = false

[[language]]
name = "javascript"
language-servers = [ "typescript-language-server" ]
scope = "source.js"
file-types = ["js", "mjs", "jsx"]
roots = [ "package.json", "jsconfig.json" ]
comment-token = "//"
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.typescript-language-server]
command = "typescript-language-server"
args = ["--stdio"]

[[language]]
name = "json"
scope = "source.json"
file-types = ["json", "jsonc"]
language-servers = [ "vscode-json-language-server" ]
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.vscode-json-language-server]
command = "vscode-json-language-server"
args = ["--stdio"]

[[language]]
name = "html"
scope = "text.html.basic"
language-servers = [ "vscode-html-language-server" ]
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.vscode-html-language-server]
command = "vscode-html-language-server"
args = ["--stdio"]

[[language]]
name = "css"
scope = "source.css"
language-servers = [ "vscode-css-language-server" ]
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.vscode-css-language-server]
command = "vscode-css-language-server"
args = ["--stdio"]

# --- Svelte ---
[[language]]
name = "svelte"
scope = "source.svelte"
injection-regex = "svelte"
file-types = ["svelte"]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = [ "svelteserver" ]
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.svelteserver]
command = "svelteserver"
args = ["--stdio"]

# --- Configuration Files (TOML, Nix, SQL, Bash) ---
[[language]]
name = "toml"
scope = "source.toml"
file-types = ["toml"]
comment-token = "#"
language-servers = [ "taplo" ]
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.taplo]
command = "taplo"
args = ["lsp", "stdio"]

[[language]]
name = "nix"
scope = "source.nix"
file-types = ["nix"]
comment-token = "#"
language-servers = [ "nil" ]
indent = { tab-width = 2, unit = "  " }
formatter = { command = "nixpkgs-fmt" }
auto-format = false

[language-server.nil]
command = "nil"

[[language]]
name = "sql"
scope = "source.sql"
file-types = ["sql", "dsql"]
comment-token = "--"
language-servers = ["sqls"]
block-comment-tokens = { start = "/*", end = "*/" }
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.sqls]
command = "sqls"

[[language]]
name = "bash"
scope = "source.bash"
file-types = ["sh", "bash", "zsh"]
shebangs = ["sh", "bash", "dash", "zsh"]
comment-token = "#"
language-servers = [ "bash-language-server" ]
indent = { tab-width = 2, unit = "  " }
auto-format = false

[language-server.bash-language-server]
command = "bash-language-server"
args = ["start"]

# --- Go ---
[[language]]
name = "go"
scope = "source.go"
file-types = ["go"]
roots = ["go.work", "go.mod"]
comment-token = "//"
language-servers = [ "gopls" ]
indent = { tab-width = 4, unit = "\t" }
auto-format = false

[language-server.gopls]
command = "gopls"
#/etc/nixos/modules/home/hyprland/hyprland.conf
# ===================================================================
# Hyprland Configuration
# Organized and documented for clarity and ease of use.
# ===================================================================

# ### MY PROGRAMS ###
# Variables for frequently used applications.
$terminal = wezterm
$fileManager = thunar
$menu = rofi -show drun -show-icons

# ### ENVIRONMENT VARIABLES ###
# Sets environment variables for the Hyprland session.
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16

# ### MONITORS ###
# Defines the monitor layout, resolution, refresh rate, and position.
# Format: monitor = <name>, <resolution@refresh>, <position>, <scale>
monitor = eDP-1, 2560x1600@120, 0x0, 1.00
monitor = HDMI-A-1, 3440x1440@100, 0x-1440, 1.00

# ### AUTOSTART ###
# Programs to be executed once at the start of the Hyprland session.

# --- AUTOSTART & RACE CONDITION FIX ---
# The applications below are started once when Hyprland launches.
#
# IMPORTANT: A `sleep 2` command is prepended to service-dependent applications (Waybar, Dunst, etc.).
# This is a workaround for a race condition introduced after gaining direct GPU access
# (by adding the user to the 'render' group). Hyprland now initializes faster than the
# user's D-Bus session bus. Without this pause, applications that rely on D-Bus will
# fail to connect and crash silently on startup.
# TODO: Investigate a more dynamic "wait for D-Bus" script instead of a fixed 2-second sleep.

# --- AUTOSTART (UWSM Managed) ---
# UWSM handles the D-Bus session and systemd scope automatically.
# No sleep needed.

# Daemons
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swww-daemon
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- dunst
exec-once = uwsm app -- wl-paste --watch cliphist store

# Wallpaper (Wait for daemon)
exec-once = swww img ~/Pictures/Wallpapers/bg-colors.jpg

# ### LOOK AND FEEL ###
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    active_opacity = 1.00
    inactive_opacity = 0.94

    # Shadow config
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3        # Omarchy uses higher blur size
        passes = 1      # And 2 passes for that "frosted glass" look
        new_optimizations = on
        ignore_opacity = true
        xray = true
    }
}

animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear

    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspaces, 1, 3, easeOutQuint, slide

    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = windowsIn, 1, 6, easeOutQuint, slide
    animation = windowsOut, 1, 5, easeOutQuint, slide

}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

# ### INPUT ###
input {
    kb_layout = us, us
    kb_variant = ,intl
    kb_options = grp:super_escape_toggle

    follow_mouse = true
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

debug {
    disable_logs = false
}

device {
    name = epic-mouse-v1
    sensitivity = -0.8
}

# ===================================================================
# ### KEYBINDINGS ###
# ===================================================================
# See https://wiki.hyprland.org/Configuring/Binds/ for more information.
$mainMod = SUPER

# --- Essential Session & Application Control ---
# bind = $mainMod SHIFT, L, exec, hyprlock                    # Lock the screen
bind = $mainMod, M, exit,                             # Exit Hyprland (gracefully quits the session)
bind = $mainMod, backspace, exec, $terminal           # Launch terminal
bind = $mainMod, E, exec, $fileManager                # Launch file manager

bind = $mainMod, space, exec, uwsm app -- $menu       # Launch application menu (Rofi)

# --- Window Management ---
bind = $mainMod, C, killactive,                       # Close the active window
bind = $mainMod, V, togglefloating,                   # Toggle floating mode for a window
bind = $mainMod SHIFT, J, togglesplit,                # Toggle between vertical and horizontal layout split
bind = $mainMod, P, pseudo,                           # Toggle pseudotiling for the master layout

# # --- Moving Focus ---
# # Use standard arrow keys to move focus between windows.
# bind = $mainMod, left, movefocus, l
# bind = $mainMod, right, movefocus, r
# bind = $mainMod, up, movefocus, u
# bind = $mainMod, down, movefocus, d

# --- Moving Focus (Vim Style) ---
# Use HJKL to move focus between windows.
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# --- Resizing Windows ---
# Use Arrow Keys to resize the active window.
bind = $mainMod, left, resizeactive, -20 0
bind = $mainMod, right, resizeactive, 20 0
bind = $mainMod, up, resizeactive, 0 -20
bind = $mainMod, down, resizeactive, 0 20

### WORKSPACES ###

# --- Workspace Control ---
# Switch to a workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move the active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Special "Magic" Workspace (Scratchpad) ---
bind = $mainMod, S, togglespecialworkspace, magic      # Toggle the magic workspace
bind = $mainMod SHIFT, S, movetoworkspace, special:magic # Move a window to the magic workspace

# --- Mouse Bindings ---
# Use the scroll wheel on the bar to switch workspaces.
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move and resize windows with the mouse.
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume (Managed by kbd-volume script + SwayOSD)
# bindel = ,XF86AudioRaiseVolume, exec, kbd-volume --up
# bindel = ,XF86AudioLowerVolume, exec, kbd-volume --down
# bindel = ,XF86AudioMute, exec, kbd-volume --mute

# Mic (Managed by kbd-mic script + SwayOSD)
bindel = ,XF86AudioMicMute, exec, kbd-mic --toggle

# Brightness (SwayOSD)
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

# --- Hardware & Special Keys ---
# 'bindel' will execute even while the screen is locked.
# Volume controls
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# --- Keyboard Layout Switching ---
# This calls our custom helper script to change the layout and show a notification.
bind = $mainMod, escape, exec, kbd-layout --change

# Screenshot controls (using flameshot)
bind = $mainMod ALT, S, exec, screenshot --region
bind = $mainMod ALT SHIFT, S, exec, screenshot --screen


# Clipboard history (cliphist+wl-clipboard)
bind = $mainMod ALT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
# bind = $mainMod ALT, D, exec, cliphist list | rofi -dmenu | cliphist delete

# Keyboard backlight control
bindel = ,XF86KbdBrightnessUp, exec, kbd-backlight --up
bindel = ,XF86KbdBrightnessDown, exec, kbd-backlight --down

# Laptop-specific controls (ASUS)
bind = ,XF86Launch4, exec, kbd-performance --change

# --- Media Player Controls ---
# 'bindl' will not repeat when the key is held down.
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ### WINDOW RULES ###
# Rules for specific application windows.
windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# /etc/nixos/src/home/desktop/hyprlock.conf

general {
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    vibrancy = 0.1696
    vibrancy_darkness = 0.05
}

image {
    monitor =
    path = @profileImg@
    size = 360
    position = 0, 192
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(@mauve_raw@)
    font_size = 96
    font_family = @monospace@
    position = 0, 512
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgb(@text_raw@)
    font_size = 16
    font_family = @monospace@
    position = 0, 448
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 320, 48
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.6

    inner_color = rgba(@mantle_raw@80)
    outer_color = rgb(@mauve_raw@) rgb(@blue_raw@) 45deg
    font_color = rgb(@text_raw@)
    
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = @borderRadius_pill@

    position = 0, -100
    halign = center
    valign = center
}

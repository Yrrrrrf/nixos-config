# /etc/nixos/src/home/desktop/hyprland.conf
# ===================================================================
# Hyprland Configuration
# ===================================================================

$terminal = wezterm
$fileManager = thunar
$menu = rofi -show drun -show-icons

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

monitor = eDP-1, 2560x1600@120, 0x0, 1.00
monitor = HDMI-A-1, 3440x1440@100, 0x-1440, 1.00

# Daemons
exec-once = uwsm app -- waybar
exec-once = uwsm app -- swww-daemon
exec-once = uwsm app -- hypridle
exec-once = uwsm app -- dunst
exec-once = uwsm app -- wl-paste --watch cliphist store

# Wallpaper
exec-once = swww img @wallpaper@

general {
    gaps_in = 2
    gaps_out = 4
    border_size = @borderWidth@
    col.active_border = rgb(@mauve_raw@) rgb(@blue_raw@) 45deg
    col.inactive_border = rgb(@surface0_raw@)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = @borderRadius_island@
    active_opacity = 1.00
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(@crust_raw@ee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = on
        ignore_opacity = true
        xray = true
    }
}

animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear

    animation = workspaces, 1, 3, easeOutQuint, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

input {
    kb_layout = us, us
    kb_variant = ,intl
    kb_options = grp:super_escape_toggle

    follow_mouse = true
    sensitivity = 0/
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace


device {
    name = epic-mouse-v1
    sensitivity = -0.8
}

$mainMod = SUPER

# --- Binds ---
bind = $mainMod, M, exit,
bind = $mainMod, return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, space, exec, uwsm app -- $menu
bind = $mainMod, W, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, J, togglesplit,
bind = $mainMod, P, pseudo,

# Focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Resize
binde = $mainMod, left, resizeactive, -16 0
binde = $mainMod, right, resizeactive, 16 0
binde = $mainMod, up, resizeactive, 0 -16
binde = $mainMod, down, resizeactive, 0 16

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Hardware
bindel = ,XF86AudioRaiseVolume, exec, volume --up
bindel = ,XF86AudioLowerVolume, exec, volume --down
bindel = ,XF86AudioMute, exec, volume --mute
bindel = ,XF86AudioMicMute, exec, mic --toggle

bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bind = $mainMod, escape, exec, layout --change
bind = $mainMod ALT, S, exec, screenshot --region
bind = $mainMod ALT SHIFT, S, exec, screenshot --screen
bind = $mainMod ALT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Rules
windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Host-specific binds (written by the host's homeExtras; missing-source warning
# is benign for hosts that don't write this file).
source = ~/.config/hypr/host-extras.conf
